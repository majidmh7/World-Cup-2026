<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matches</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .nav-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .date-banner { font-size: 18px; font-weight: bold; margin: 0; background: #eee; padding: 8px 15px; border-radius: 20px; }
    .btn-nav { padding: 8px 15px; font-weight: bold; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
    .match-card { background: white; border: 1px solid #ddd; padding: 15px; margin-bottom: 20px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .team-header { font-size: 18px; font-weight: bold; margin: 10px 0; }
    .pred-list { background: #f9f9f9; padding: 12px; border-radius: 8px; margin-top: 15px; }
    .pred-item { padding: 6px 0; border-bottom: 1px dashed #e0e0e0; font-size: 14px; }
    .pred-item:last-child { border-bottom: none; }
  </style>
</head>
<body style="background: #f5f7fb; margin: 0; padding: 15px;">
  <div style="max-width: 600px; margin: 0 auto;">
    
    <div class="nav-container">
      <a href="index.html" style="text-decoration: none; font-weight: bold; color: #007bff; font-size: 16px;">⬅️ Menu</a>
      <div class="date-banner" id="current-date-display">...</div>
    </div>

    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
      <button class="btn-nav" style="flex: 1;" onclick="changeMatchDay(-1)">◀ Previous Day</button>
      <button class="btn-nav" style="flex: 1;" onclick="changeMatchDay(1)">Next Day ▶</button>
    </div>
    
    <div id="container-today-matches"></div>
  </div>

  <script src="app.js"></script>
  <script>
    let activeDate = new Date();

    window.addEventListener('DOMContentLoaded', () => {
      currentLang = localStorage.getItem('poule_lang') || 'nl';
      renderView();
    });

    function renderView() {
      // Format as standard YYYY-MM-DD for the fetch filter
      const yyyy = activeDate.getFullYear();
      const mm = String(activeDate.getMonth() + 1).padStart(2, '0');
      const dd = String(activeDate.getDate()).padStart(2, '0');
      const dateString = `${yyyy}-${mm}-${dd}`;
      
      document.getElementById('current-date-display').innerText = dateString;
      renderTodayMatches(dateString);
    }

    function changeMatchDay(offset) {
      activeDate.setDate(activeDate.getDate() + offset);
      renderView();
    }
  </script>
</body>
</html>
