<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Today's Matches</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container" style="padding: 20px;">
    <a href="index.html" style="text-decoration: none; font-weight: bold; color: #007bff;">⬅️ Menu</a>
    <h2 id="ui-today-title" style="margin-top: 20px;">Matches</h2>
    
    <div id="container-today-matches"></div>
  </div>

  <script src="app.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      currentLang = localStorage.getItem('poule_lang') || 'nl';
      document.getElementById('ui-today-title').innerText = translations[currentLang].todayTitle;
      renderTodayMatches(); // Calls your processing engine inside app.js
    });
  </script>
</body>
</html>
