<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Score Standings</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container" style="padding: 20px;">
    <a href="index.html" style="text-decoration: none; font-weight: bold; color: #28a745;">⬅️ Menu</a>
    <h2 id="ui-standings-title" style="margin-top: 20px;">Standings</h2>
    
    <div id="container-leaderboard"></div>
  </div>

  <script src="app.js?v=77"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      currentLang = localStorage.getItem('poule_lang') || 'nl';
      document.getElementById('ui-standings-title').innerText = translations[currentLang].menuStandings;
      renderLeaderboard(); // Calls your leaderboard engine inside app.js
    });
  </script>
</body>
</html>
